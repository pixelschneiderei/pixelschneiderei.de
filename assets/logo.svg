<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 260" role="img" aria-label="Pixelschneiderei – Design · Web · Entwicklung">
  <title>Pixelschneiderei</title>

  <defs>
    <style>
      .ink   { fill: #1a1a1a; }
      .red   { fill: #b1383a; }
      .cream { fill: #e0d3bf; }
      .frame { fill: none; stroke: #1a1a1a; stroke-linejoin: round; stroke-linecap: round; }
    </style>
  </defs>

  <!-- ============ LAPTOP ============ -->
  <!-- Screen frame -->
  <rect class="frame" x="44" y="32" width="208" height="146" rx="4" stroke-width="3.6"/>

  <!-- Screen content (abstract website mockup) -->
  <g>
    <!-- Top bar: red square + cream line -->
    <rect class="red"   x="56" y="44" width="16" height="16"/>
    <rect class="cream" x="78" y="48" width="116" height="8" rx="1"/>

    <!-- Hero area -->
    <rect class="cream" x="56" y="68" width="80" height="42" rx="1"/>
    <rect class="ink"   x="142" y="68" width="86" height="42" rx="1"/>

    <!-- Body row of tiles -->
    <rect class="ink"   x="56"  y="116" width="44" height="10" rx="1"/>
    <rect class="cream" x="106" y="116" width="44" height="10" rx="1"/>
    <rect class="cream" x="156" y="116" width="72" height="10" rx="1"/>

    <!-- Footer area -->
    <rect class="cream" x="56" y="132" width="172" height="38" rx="1"/>
    <rect class="ink"   x="64" y="142" width="38" height="6"  rx="1"/>
    <rect class="ink"   x="64" y="154" width="58" height="6"  rx="1"/>
  </g>

  <!-- Laptop base (trapezoid keyboard) -->
  <path class="frame" d="M22 184 L274 184 L246 226 L50 226 Z" stroke-width="3.6"/>
  <!-- Touchpad notch -->
  <line x1="118" y1="184" x2="178" y2="184" stroke="#1a1a1a" stroke-width="2.4" stroke-linecap="round"/>

  <!-- Keyboard keys -->
  <g class="ink">
    <!-- Row 1 -->
    <g>
      <rect x="64"  y="194" width="10" height="4" rx="1"/>
      <rect x="78"  y="194" width="10" height="4" rx="1"/>
      <rect x="92"  y="194" width="10" height="4" rx="1"/>
      <rect x="106" y="194" width="10" height="4" rx="1"/>
      <rect x="120" y="194" width="10" height="4" rx="1"/>
      <rect x="134" y="194" width="10" height="4" rx="1"/>
      <rect x="148" y="194" width="10" height="4" rx="1"/>
      <rect x="162" y="194" width="10" height="4" rx="1"/>
      <rect x="176" y="194" width="10" height="4" rx="1"/>
      <rect x="190" y="194" width="10" height="4" rx="1"/>
      <rect x="204" y="194" width="10" height="4" rx="1"/>
      <rect x="218" y="194" width="10" height="4" rx="1"/>
    </g>
    <!-- Row 2 -->
    <g>
      <rect x="68"  y="204" width="10" height="4" rx="1"/>
      <rect x="82"  y="204" width="10" height="4" rx="1"/>
      <rect x="96"  y="204" width="10" height="4" rx="1"/>
      <rect x="110" y="204" width="10" height="4" rx="1"/>
      <rect x="124" y="204" width="10" height="4" rx="1"/>
      <rect x="138" y="204" width="10" height="4" rx="1"/>
      <rect x="152" y="204" width="10" height="4" rx="1"/>
      <rect x="166" y="204" width="10" height="4" rx="1"/>
      <rect x="180" y="204" width="10" height="4" rx="1"/>
      <rect x="194" y="204" width="10" height="4" rx="1"/>
      <rect x="208" y="204" width="10" height="4" rx="1"/>
      <rect x="222" y="204" width="10" height="4" rx="1"/>
    </g>
    <!-- Spacebar -->
    <rect x="98" y="214" width="100" height="4" rx="1"/>
  </g>

  <!-- ============ THREAD (red curling loop) ============ -->
  <g fill="none" stroke="#b1383a" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main curl from needle eye, looping in front of the laptop -->
    <path d="M218 36
             C 196 56, 244 84, 200 108
             C 158 130, 130 86, 108 124
             C 84 166, 158 184, 142 218
             C 134 234, 168 240, 196 224"/>
    <!-- Small secondary loop near eye for depth -->
    <path d="M226 28 C 244 32, 246 56, 232 64"/>
  </g>

  <!-- ============ NEEDLE ============ -->
  <g>
    <!-- Needle body (sharp diagonal line) -->
    <line x1="248" y1="20" x2="98" y2="232" stroke="#1a1a1a" stroke-width="3.4" stroke-linecap="round"/>
    <!-- Needle eye (oriented along the needle axis) -->
    <ellipse cx="242" cy="29" rx="6" ry="2.6" transform="rotate(-55 242 29)" fill="#ffffff" stroke="#1a1a1a" stroke-width="2.2"/>
    <!-- Needle tip accent (just the very tip darker) -->
    <circle cx="98" cy="232" r="2.4" fill="#1a1a1a"/>
  </g>

  <!-- ============ WORDMARK ============ -->
  <!-- "Pixel" — Fraunces serif, ink -->
  <text x="296" y="142"
        font-family="Fraunces, 'Times New Roman', serif"
        font-size="82" font-weight="400" fill="#1a1a1a"
        letter-spacing="-2"
        font-variation-settings="'opsz' 144, 'SOFT' 30">Pixel<tspan font-style="italic" fill="#b1383a" font-weight="300" letter-spacing="-1.5">schneiderei</tspan></text>

  <!-- Tagline — Inter, tracked, muted -->
  <text x="299" y="180"
        font-family="Inter, system-ui, sans-serif"
        font-size="14" font-weight="500"
        fill="#9d9da0"
        letter-spacing="6.5">DESIGN &#160;&#183;&#160; WEB &#160;&#183;&#160; ENTWICKLUNG</text>
</svg>
